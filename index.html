<!DOCTYPE html>
<html>
<head>
  <title>Login Page Practice</title>
  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
    }
    input {
      display: block;
      margin: 10px 0;
      padding: 10px;
      width: 200px;
    }
    button {
      padding: 10px;
      width: 100%;
      background: #4CAF50;
      color: white;
      border: none;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Login</h2>
  <input type="text" placeholder="Username">
  <input type="password" placeholder="Password">
  <button onclick="alert('This is a demo. No data is collected.')">
    Login
  </button>
</div>

</body>
</html>
